rules:
  # release.yml is auto-generated by cargo-dist; modifications are overwritten on update
  excessive-permissions:
    ignore:
      - release.yml
  undocumented-permissions:
    ignore:
      - release.yml
  # docs.yml needs persist-credentials for git push
  artipacked:
    ignore:
      - docs.yml
  template-injection:
    ignore:
      - release.yml
  # daily interval is intentional for this project
  dependabot-cooldown:
    disable: true
  # trusted publishing migration is tracked separately
  use-trusted-publishing:
    ignore:
      - publish.yml
  # secrets are correctly scoped in step-level env: blocks
  secrets-outside-env:
    ignore:
      - publish.yml
  # release.yml job definitions are auto-generated by cargo-dist
  anonymous-definition:
    ignore:
      - release.yml
