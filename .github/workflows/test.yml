name: test
permissions:
  contents: read # checkout
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/actions/**"
      - ".github/workflows/test.yml"
  push:
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/actions/**"
      - ".github/workflows/test.yml"
jobs:
  tier1:
    name: Tier 1
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-22.04-arm # TODO: use ubuntu-24.04-arm if https://github.com/rust-lang/rust/issues/135867 resolved
          - windows-latest
          - windows-11-arm
          - macos-latest
#          - freebsd-latest # self-hosted
        rust:
          - stable
          - beta
          - nightly
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    steps:
      - name: git autocrlf false
        if: startsWith(matrix.os, 'windows')
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update
          sudo apt install -y libacl1-dev
      - name: Install Rustup
        if: ${{ matrix.os == 'windows-11-arm' }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile "$env:TEMP\rustup-init.exe"
           & "$env:TEMP\rustup-init.exe" --default-toolchain none --profile=minimal -y
          "$env:USERPROFILE\.cargo\bin" | Out-File -Append -Encoding ascii $env:GITHUB_PATH
          "CARGO_HOME=$env:USERPROFILE\.cargo" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: ${{ matrix.rust }}
      - name: Install cargo-hack from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: cargo-hack
          cache-key: ${{ matrix.os }}
      - name: Restore rust build cache
        id: restore-rust-build-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            target/*
            !target/tmp
          key: "${{ matrix.os }}-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}"
          restore-keys: "${{ matrix.os }}-${{ steps.install_rust.outputs.version }}"
      - name: run test
        run: |
          cargo hack test --locked --release --feature-powerset --exclude-features wasm --exclude portable-network-archive-fuzz --exclude xtask -- --test-threads=1
        env:
          RUST_BACKTRACE: 1
      - name: Save rust build cache
        if: github.ref_name == github.event.repository.default_branch && steps.restore-rust-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            target/*
            !target/tmp
          key: "${{ steps.restore-rust-build-cache.outputs.cache-primary-key }}"

  tier3_cross:
    name: Tier 3 Cross-compile
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: redoxos/redoxer
            target: x86_64-unknown-redox
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: run test
        if: startsWith(matrix.target, 'x86_64-unknown-redox')
        run: |
          export PATH=$PATH:/root/.redoxer/"$TARGET"/toolchain/bin
          rustup default nightly
          rustup target add "$TARGET"
          cargo build -p portable-network-archive --locked --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
          RUST_BACKTRACE: 1
          AR_x86_64_unknown_redox: "x86_64-unknown-redox-ar"
          CC_x86_64_unknown_redox: "x86_64-unknown-redox-gcc"
          CARGO_TARGET_X86_64_UNKNOWN_REDOX_LINKER: "x86_64-unknown-redox-gcc"
          CARGO_TARGET_X86_64_UNKNOWN_REDOX_RUNNER: "redoxer exec --folder ."

  tier3:
    name: Tier 3
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        rust:
          - stable
        target:
          - x86_64-pc-solaris
          - x86_64-unknown-fuchsia
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: ${{ matrix.rust }}
          target: ${{ matrix.target }}
      - name: run test
        run: |
          cargo check --locked --target "$TARGET" --workspace --exclude portable-network-archive-fuzz --exclude xtask
        env:
          TARGET: ${{ matrix.target }}
          RUST_BACKTRACE: 1

  msrv:
    name: MSRV
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
        crate:
          - libpna
          - pna
          - portable-network-archive
        include:
          - crate: libpna
            rust: '1.88'
          - crate: pna
            rust: '1.88'
          - crate: portable-network-archive
            rust: '1.88'
    runs-on: ${{ matrix.os }}
    steps:
      - name: git autocrlf false
        if: startsWith(matrix.os, 'windows')
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: install dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt update
          sudo apt install -y libacl1-dev
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: install_rust
        uses: ./.github/actions/setup-rust
        with:
          channel: ${{ matrix.rust }}
      - name: Install cargo-hack from crates.io
        uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: cargo-hack
          cache-key: ${{ matrix.os }}
      - name: Restore rust build cache
        id: restore-rust-build-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            target/*
            !target/tmp
          key: "${{ matrix.os }}-${{ steps.install_rust.outputs.version }}-${{ hashFiles('**/Cargo.lock') }}"
          restore-keys: "${{ matrix.os }}-${{ steps.install_rust.outputs.version }}"
      - name: run test
        run: |
          cargo hack test --locked --release --feature-powerset --exclude-features wasm -p "$CRATE" -- --test-threads=1
        env:
          CRATE: ${{ matrix.crate }}
          RUST_BACKTRACE: 1
      - name: Save rust build cache
        if: github.ref_name == github.event.repository.default_branch && steps.restore-rust-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            target/*
            !target/tmp
          key: "${{ steps.restore-rust-build-cache.outputs.cache-primary-key }}"
