name: VM Tests
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/vm.yml"
  pull_request:
    branches: ["*"]
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/vm.yml"

permissions:
  contents: read # checkout

env:
  RUST_BACKTRACE: 1

jobs:
  solaris-test:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    name: Test on Solaris
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Test in Solaris
        id: test
        uses: vmactions/solaris-vm@c20562b2c69737b06be9e828915761703e487373 # v1.3.3
        with:
          envs: "RUST_BACKTRACE"
          copyback: false
          disable-cache: true
          usesh: true
          prepare: |
            pkg install bash libtool gnu-m4 tree wget gcc autoconf //solaris/text/gawk pkg://solaris/text/gnu-diffutils pkg://solaris/text/gnu-grep pkg://solaris/text/gnu-sed cmake
            source <(curl -s https://raw.githubusercontent.com/psumbera/solaris-rust/refs/heads/main/sh.rust-web-install)
            # mv /root/.rust_solaris/rustc-*/ /root/.rust_solaris/rustc/
          run: |
            set -e
            export LC_ALL=C LANG=C
            # export PATH=/root/.rust_solaris/rustc/bin:$PATH
            uname -a
            chown -R $(whoami):$(id -gn) ./
            chmod -R a+rw ./
            cargo install -f cargo-hack@0.6.33 --locked
            cargo hack test --locked --release --feature-powerset --exclude-features wasm

  NetBSD-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    name: Test on NetBSD
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Test in NetBSD
        id: test
        uses: vmactions/NetBSD-vm@eb3ba840926911ccf17dc9de235335cb27a02ba0 # v1.3.8
        with:
          envs: "RUST_BACKTRACE"
          copyback: false
          disable-cache: true
          usesh: true
          prepare: |
            /usr/sbin/pkg_add -v curl cmake
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          run: |
            set -e
            . "$HOME/.cargo/env"
            export LC_ALL=C LANG=C
            uname -a
            export PATH=$PATH:/usr/sbin
            chown -R $(whoami):$(id -gn) ./
            chmod -R a+rw ./
            cargo install -f cargo-hack --locked
            cargo hack test --locked --release --feature-powerset --exclude-features wasm

  FreeBSD-test:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    name: Test on FreeBSD
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Test in FreeBSD
        id: test
        uses: vmactions/freebsd-vm@d1e65811565151536c0c894fff74f06351ed26e6 # v1.4.5
        with:
          envs: "RUST_BACKTRACE"
          copyback: false
          disable-cache: true
          usesh: true
          prepare: |
            # Workaround vmactions/freebsd-vm pkg signature config issue
            # ("truncated reply for signature_fingerprints"); pull packages
            # over HTTPS without fingerprint verification. See
            # https://github.com/vmactions/freebsd-vm/issues/141 for the
            # related geo-mirror flakiness pattern.
            mkdir -p /usr/local/etc/pkg/repos
            # Use the rolling `latest` repository instead of `quarterly`.
            # The current quarterly snapshot exposes group-level integrity
            # failures during `pkg install`: it ships incompatible release
            # and devel variants of pkg(8) and gcc12/13/14/15 that all claim
            # ownership of the same files (e.g. _pkg.bash, c++14, libgccjit.h).
            # The rolling `latest` index keeps the variant set internally
            # consistent. Run ids witnessing the quarterly breakage:
            # 25246917346 (initial), 25251665720, 25253956945.
            cat > /usr/local/etc/pkg/repos/FreeBSD.conf <<'EOF'
            FreeBSD: {
              url: "pkg+https://pkg.FreeBSD.org/${ABI}/latest",
              mirror_type: "srv",
              signature_type: "none",
              enabled: yes
            }
            EOF
            # cmake is required at build time by libz-ng-sys (transitive
            # dependency activated by the zlib-ng feature, which is part of
            # the feature-powerset matrix below).
            pkg install -y curl cmake
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          run: |
            set -e
            . "$HOME/.cargo/env"
            export LC_ALL=C LANG=C
            uname -a
            # vmactions/freebsd-vm root is ZFS+nfsv4acls; POSIX.1e ACL tests
            # need a UFS+acls filesystem. Create a vnode-backed UFS image and
            # point CARGO_TARGET_DIR there so integration test cwd
            # (CARGO_TARGET_TMPDIR = $CARGO_TARGET_DIR/tmp) lives on UFS.
            # The UFS image must hold the entire `cargo hack test
            # --feature-powerset --release` build artifact set across every
            # feature combination, which easily exceeds 4 GiB. The previous
            # 4 GiB allotment caused the VM to become unresponsive (ssh exit
            # code 255) after ~42 minutes when the image filled up; raise it
            # to 12 GiB so the build can complete within the runner host
            # disk budget (ubuntu-latest provides ~14 GiB).
            truncate -s 12g /tmp/ufs.img
            mdconfig -a -t vnode -f /tmp/ufs.img -u 9
            newfs /dev/md9
            mkdir -p /mnt/ufs
            mount -o acls /dev/md9 /mnt/ufs
            export CARGO_TARGET_DIR=/mnt/ufs/target
            mkdir -p "$CARGO_TARGET_DIR"
            chown -R $(whoami):$(id -gn) ./
            chmod -R a+rw ./
            cargo install -f cargo-hack --locked
            cargo hack test --locked --release --feature-powerset --exclude-features wasm

  OpenBSD-test:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    name: Test on OpenBSD
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Test in OpenBSD
        id: test
        uses: vmactions/OpenBSD-vm@d7d892b7b9ba97ed2747b0fc201be65037d64c3e # v1.4.0
        with:
          envs: "RUST_BACKTRACE"
          copyback: false
          disable-cache: true
          usesh: true
          prepare: |
            /usr/sbin/pkg_add -I -v gmake gettext-tools gtar libtool m4 cmake
            /usr/sbin/pkg_add -I -v rust
          run: |
            set -e
            export LC_ALL=C LANG=C
            uname -a
            chown -R $(whoami):$(id -gn) ./
            chmod -R a+rw ./
            cargo install -f cargo-hack --locked
            ulimit -n 2048
            cargo hack test --locked --release --feature-powerset --exclude-features wasm

