name: Update CLI Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'cli/src/**'
      - 'xtask/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs:
    name: Update docs
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit and push generated docs
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Generate CLI documentation
        run: cargo xtask docgen --output docs/cli-reference.md

      - name: Check for changes
        id: changes
        run: |
          git add docs/cli-reference.md
          if git diff --cached --quiet docs/cli-reference.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m ":memo: Update CLI documentation [skip ci]"
          git pull --rebase
          git push
