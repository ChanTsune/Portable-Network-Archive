name: bsdtar compatibility

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'cli/src/**'
      - 'cli/Cargo.toml'
      - 'lib/src/**'
      - 'lib/Cargo.toml'
      - 'pna/src/**'
      - 'pna/Cargo.toml'
      - 'xtask/src/**'
      - 'xtask/Cargo.toml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/bsdtar-compat.yml'
      - '.github/scripts/pnatar-wrapper.sh'
  pull_request:
    branches: ["*"]
    paths:
      - 'cli/src/**'
      - 'cli/Cargo.toml'
      - 'lib/src/**'
      - 'lib/Cargo.toml'
      - 'pna/src/**'
      - 'pna/Cargo.toml'
      - 'xtask/src/**'
      - 'xtask/Cargo.toml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/bsdtar-compat.yml'
      - '.github/scripts/pnatar-wrapper.sh'

jobs:
  bsdtar-reference:
    name: Verify bsdtar_test passes with bsdtar (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: ubuntu-24.04-arm
            shell: bash
          - name: macos
            runner: macos-latest
            shell: bash
          - name: windows
            runner: windows-2022
            shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail {0}'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      CHERE_INVOKING: 1
      MSYSTEM: MINGW64
      MSYS2_PATH_TYPE: inherit
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Configure Git for Windows checkout
        if: ${{ matrix.name == 'windows' }}
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.longpaths true

      - name: Install build dependencies (Ubuntu)
        if: ${{ matrix.name == 'ubuntu' }}
        run: |
          sudo apt update
          sudo apt install -y libacl1-dev libssl-dev pkg-config autoconf automake libtool

      - name: Install build dependencies (macOS)
        if: ${{ matrix.name == 'macos' }}
        run: |
          brew install autoconf automake libtool make pkg-config

      - name: Install build dependencies (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: cmd
        run: choco install mingw

      - name: Clone libarchive
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: libarchive/libarchive
          ref: v3.8.5
          path: libarchive

      - name: Build bsdtar and bsdtar_test
        if: ${{ matrix.name != 'windows' }}
        run: |
          cd libarchive
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu)"
          MAKE="$(command -v gmake || command -v make)"
          if [ "${{ matrix.name }}" = "macos" ]; then
            export LIBTOOLIZE=glibtoolize
          fi
          ./build/autogen.sh
          ./configure --enable-bsdtar --disable-bsdcpio --disable-bsdcat --disable-bsdunzip
          "${MAKE}" tar/test/list.h
          "${MAKE}" -j"${JOBS}" bsdtar_test bsdtar

      - name: Build bsdtar and bsdtar_test (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: cmd
        working-directory: libarchive
        env:
          BE: mingw-gcc
        run: |
          set ROOT=%CD%
          call build\ci\github_actions\ci.cmd deplibs
          cd /d "%ROOT%"
          call build\ci\github_actions\ci.cmd configure
          cd /d "%ROOT%"
          call build\ci\github_actions\ci.cmd build

      - name: Locate built binaries
        run: |
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
            BSDTAR_BIN="${WORKSPACE}/libarchive/build_ci/cmake/bin/bsdtar.exe"
            BSDTAR_TEST_BIN="${WORKSPACE}/libarchive/build_ci/cmake/bin/bsdtar_test.exe"
            ls -la "${WORKSPACE}/libarchive/build_ci/cmake/bin" || true
          else
            BSDTAR_BIN="$(find "${WORKSPACE}/libarchive" -type f \( -name 'bsdtar' -o -name 'bsdtar.exe' \) | sort | head -n1)"
            BSDTAR_TEST_BIN="$(find "${WORKSPACE}/libarchive" -type f \( -name 'bsdtar_test' -o -name 'bsdtar_test.exe' \) | sort | head -n1)"
          fi
          echo "BSDTAR_BIN candidate: ${BSDTAR_BIN}"
          echo "BSDTAR_TEST_BIN candidate: ${BSDTAR_TEST_BIN}"
          test -f "${BSDTAR_BIN}"
          test -f "${BSDTAR_TEST_BIN}"
          echo "BSDTAR_BIN=${BSDTAR_BIN}" >> "$GITHUB_ENV"
          echo "BSDTAR_TEST_BIN=${BSDTAR_TEST_BIN}" >> "$GITHUB_ENV"

      - name: Run bsdtar_test with bsdtar
        id: bsdtar_test
        continue-on-error: true
        run: |
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
          fi
          "${BSDTAR_TEST_BIN}" \
            -p "${BSDTAR_BIN}" \
            -r "${WORKSPACE}/libarchive/tar/test" \
            -v 2>&1 | tee bsdtar_test_output.txt

      - name: Fail on abnormal bsdtar_test termination
        if: always()
        run: |
          if [ ! -f bsdtar_test_output.txt ]; then
            echo "bsdtar_test output was not generated" >&2
            exit 1
          fi

          COMPLETED_BLOCKS=$(grep -c 'Tests run:' bsdtar_test_output.txt || true)
          if [ "${COMPLETED_BLOCKS}" -lt 1 ]; then
            echo "bsdtar_test did not reach its totals section" >&2
            exit 1
          fi

  pna-stdio:
    name: Test pna stdio with bsdtar_test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu
            runner: ubuntu-24.04-arm
            shell: bash
            exe_suffix: ''
          - name: macos
            runner: macos-latest
            shell: bash
            exe_suffix: ''
          - name: windows
            runner: windows-2022
            shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail {0}'
            exe_suffix: '.exe'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CHERE_INVOKING: 1
      MSYSTEM: MINGW64
      MSYS2_PATH_TYPE: inherit
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Configure Git for Windows checkout
        if: ${{ matrix.name == 'windows' }}
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.longpaths true

      - name: Checkout pna
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pna

      - name: Install dependencies (Ubuntu)
        if: ${{ matrix.name == 'ubuntu' }}
        run: |
          sudo apt update
          sudo apt install -y libacl1-dev libssl-dev pkg-config autoconf automake libtool sharutils

      - name: Install dependencies (macOS)
        if: ${{ matrix.name == 'macos' }}
        run: |
          brew install autoconf automake libtool make pkg-config

      - name: Install dependencies (Windows)
        if: ${{ matrix.name == 'windows' }}
        run: |
          pacman --noconfirm -Sy --needed \
            gzip \
            sharutils

      - name: Install MinGW (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: cmd
        run: choco install mingw

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4

      - name: Build pna
        if: ${{ matrix.name != 'windows' }}
        run: |
          cargo build --locked --release --all-features -p portable-network-archive
        working-directory: pna

      - name: Build pna (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -A warnings
        run: |
          cargo build --locked --release --all-features -p portable-network-archive
        working-directory: pna

      - name: Clone libarchive
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: libarchive/libarchive
          ref: v3.8.5
          path: libarchive

      - name: Build bsdtar_test
        if: ${{ matrix.name != 'windows' }}
        run: |
          cd libarchive
          JOBS="$(getconf _NPROCESSORS_ONLN 2>/dev/null || sysctl -n hw.ncpu)"
          MAKE="$(command -v gmake || command -v make)"
          if [ "${{ matrix.name }}" = "macos" ]; then
            export LIBTOOLIZE=glibtoolize
          fi
          ./build/autogen.sh
          ./configure --enable-bsdtar --disable-bsdcpio --disable-bsdcat --disable-bsdunzip
          "${MAKE}" tar/test/list.h
          "${MAKE}" -j"${JOBS}" bsdtar_test

      - name: Build bsdtar_test (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: cmd
        working-directory: libarchive
        env:
          BE: mingw-gcc
        run: |
          set ROOT=%CD%
          call build\ci\github_actions\ci.cmd deplibs
          cd /d "%ROOT%"
          call build\ci\github_actions\ci.cmd configure
          cd /d "%ROOT%"
          call build\ci\github_actions\ci.cmd build

      - name: Build tar2pna
        if: ${{ matrix.name != 'windows' }}
        run: cargo build --locked --release -p xtask
        working-directory: pna

      - name: Build tar2pna (Windows)
        if: ${{ matrix.name == 'windows' }}
        shell: pwsh
        env:
          RUSTFLAGS: -A warnings
        run: cargo build --locked --release -p xtask
        working-directory: pna

      - name: Record built binaries
        run: |
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
            BSDTAR_TEST_BIN="${WORKSPACE}/libarchive/build_ci/cmake/bin/bsdtar_test.exe"
            ls -la "${WORKSPACE}/libarchive/build_ci/cmake/bin" || true
          else
            BSDTAR_TEST_BIN="$(find "${WORKSPACE}/libarchive" -type f \( -name 'bsdtar_test' -o -name 'bsdtar_test.exe' \) | sort | head -n1)"
          fi
          PNA_BIN="${WORKSPACE}/pna/target/release/pna${{ matrix.exe_suffix }}"
          XTASK_BIN="${WORKSPACE}/pna/target/release/xtask${{ matrix.exe_suffix }}"
          echo "PNA_BIN candidate: ${PNA_BIN}"
          echo "XTASK_BIN candidate: ${XTASK_BIN}"
          echo "BSDTAR_TEST_BIN candidate: ${BSDTAR_TEST_BIN}"
          test -f "${PNA_BIN}"
          test -f "${XTASK_BIN}"
          test -f "${BSDTAR_TEST_BIN}"
          echo "PNA_BIN=${PNA_BIN}" >> "$GITHUB_ENV"
          echo "XTASK_BIN=${XTASK_BIN}" >> "$GITHUB_ENV"
          echo "BSDTAR_TEST_BIN=${BSDTAR_TEST_BIN}" >> "$GITHUB_ENV"

      - name: Create pnatar wrapper
        run: |
          WORKSPACE='${{ github.workspace }}'
          PNATAR_SCRIPT_REL='pna/.github/scripts/pnatar-wrapper.sh'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
            PNATAR_BIN="${WORKSPACE}/pnatar.cmd"
            PNATAR_SH="${WORKSPACE}/${PNATAR_SCRIPT_REL}"
            PNATAR_SH_WIN="$(cygpath -w "${PNATAR_SH}")"
            PNA_WIN="$(cygpath -w "${PNA_BIN}")"
            printf '@echo off\r\n"C:\\msys64\\usr\\bin\\bash.exe" "%s" "%s" %%*\r\n' "${PNATAR_SH_WIN}" "${PNA_WIN}" > "${PNATAR_BIN}"
          else
            PNATAR_BIN="${WORKSPACE}/pnatar"
            PNATAR_SH="${WORKSPACE}/${PNATAR_SCRIPT_REL}"
            printf '#!/bin/sh\nexec bash "%s" "%s" "$@"\n' "${PNATAR_SH}" "${PNA_BIN}" > "${PNATAR_BIN}"
            chmod +x "${PNATAR_BIN}"
          fi
          echo "PNATAR_BIN=${PNATAR_BIN}" >> "$GITHUB_ENV"

      - name: Convert reference files to PNA
        run: |
          set -euo pipefail
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
          fi
          LIBARCHIVE_REFDIR="${WORKSPACE}/libarchive/tar/test"
          PNA_REFDIR="${WORKSPACE}/pna_refdir"
          WORKDIR="$(mktemp -d)"

          mkdir -p "$PNA_REFDIR"
          cp "$LIBARCHIVE_REFDIR"/*.uu "$PNA_REFDIR/"

          for tar_name in \
            test_extract.tar.bz2 \
            test_extract.tar.gz \
            test_extract.tar.lzma \
            test_extract.tar.xz \
            test_extract.tar.Z \
            test_extract.tar.zst \
            test_leading_slash.tar \
            test_list_item.tar \
            test_option_keep_newer_files.tar.Z \
            test_option_s.tar.Z \
            test_patterns_2.tar \
            test_patterns_3.tar \
            test_patterns_4.tar \
            test_print_longpath.tar.Z
          do
            cd "$WORKDIR"
            uudecode "$LIBARCHIVE_REFDIR/${tar_name}.uu"
            base="${tar_name%%.*}"
            "${XTASK_BIN}" tar2pna "$WORKDIR/$tar_name" -o "$WORKDIR/${base}.pna"
            cp "$WORKDIR/${base}.pna" "$WORKDIR/$tar_name"
            uuencode "$WORKDIR/$tar_name" "$tar_name" > "$PNA_REFDIR/${tar_name}.uu"
            rm -f "$WORKDIR/$tar_name" "$WORKDIR/${base}.pna"
          done

          for zip_name in \
            test_option_passphrase.zip
          do
            cd "$WORKDIR"
            uudecode "$LIBARCHIVE_REFDIR/${zip_name}.uu"
            base="${zip_name%%.*}"
            "${XTASK_BIN}" zip2pna "$WORKDIR/$zip_name" --password pass1 -o "$WORKDIR/${base}.pna"
            cp "$WORKDIR/${base}.pna" "$WORKDIR/$zip_name"
            uuencode "$WORKDIR/$zip_name" "$zip_name" > "$PNA_REFDIR/${zip_name}.uu"
            rm -f "$WORKDIR/$zip_name" "$WORKDIR/${base}.pna"
          done
          rm -rf "$WORKDIR"

      - name: Run bsdtar_test with pnatar
        id: bsdtar_test
        continue-on-error: true
        run: |
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
          fi
          REFDIR="${WORKSPACE}/pna_refdir"
          # Exclude tests that crash the process via NULL dereference in assertEqualMem
          # after slurpfile() returns NULL for ustar archives pnatar cannot create.
          # bsdtar_test runs in-process (no fork), so a SEGV kills the entire run.
          #   #37 test_option_gid_gname
          #   #38 test_option_group
          #   #57 test_option_owner
          #   #63 test_option_uid_uname
          : > bsdtar_test_output.txt
          for range in 0-36 39-56 58-62 64-75; do
            "${BSDTAR_TEST_BIN}" -p "${PNATAR_BIN}" -r "$REFDIR" -v "$range" 2>&1 | tee -a bsdtar_test_output.txt || true
          done

      - name: Collect test artifacts
        if: always() && steps.bsdtar_test.outcome != 'skipped'
        run: |
          WORKSPACE='${{ github.workspace }}'
          if [ "${{ matrix.name }}" = "windows" ]; then
            WORKSPACE="$(cygpath -u "$WORKSPACE")"
          fi
          mkdir -p artifact-staging
          cp -f bsdtar_test_output.txt artifact-staging/ || true
          cp -rf /tmp/bsdtar* artifact-staging/ 2>/dev/null || true
          cd artifact-staging
          "${PNA_BIN}" create -f "${WORKSPACE}/bsdtar-test-artifacts.pna" .
          cd "${WORKSPACE}"

      - name: Upload test artifacts
        if: always() && steps.bsdtar_test.outcome != 'skipped'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bsdtar-test-artifacts-${{ matrix.name }}
          path: bsdtar-test-artifacts.pna
          retention-days: 7

      - name: Generate summary
        if: always()
        run: |
          echo "## bsdtar compatibility test results (${{ matrix.name }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ ! -f bsdtar_test_output.txt ]; then
            echo "No test output found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          COMPLETED_BLOCKS=$(grep -c 'Tests run:' bsdtar_test_output.txt || true)
          if [ "${COMPLETED_BLOCKS}" -lt 4 ]; then
            echo "> **Warning**: Test run did not complete (possible crash)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Completed ranges: ${COMPLETED_BLOCKS} / 4" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            LAST_TEST=$(awk '
              /^[[:space:]]+[0-9]+: / {
                line = $0
                sub(/^[[:space:]]+[0-9]+: /, "", line)
                split(line, fields, /[[:space:]]+/)
                if (fields[1] != "") {
                  last = fields[1]
                }
              }
              END {
                if (last != "") {
                  print last
                } else {
                  print "unknown"
                }
              }
            ' bsdtar_test_output.txt)
            echo "Last test seen: \`${LAST_TEST}\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Derive counts from individual test result lines
          # Execution lines: "  N: test_name" (no parentheses)
          # Failure lines:   "  N: test_name (X failures)" (with count)
          TOTAL=$(awk '/^[[:space:]]+[0-9]+: / && !/failure/ { n++ } END { print n + 0 }' bsdtar_test_output.txt)
          FAILING=$(awk '
            /^[[:space:]]+[0-9]+: / && /failure/ {
              line = $0
              sub(/^[[:space:]]+[0-9]+: /, "", line)
              print line
            }
          ' bsdtar_test_output.txt)
          if [ -n "$FAILING" ]; then
            FAILED=$(echo "$FAILING" | wc -l | tr -d ' ')
          else
            FAILED=0
          fi
          ASSERT_FAIL=$(awk '/^[[:space:]]+[0-9]+: / && /failure/ {
            gsub(/.*\(/, ""); gsub(/ .*/, ""); sum += $0
          } END { print sum + 0 }' bsdtar_test_output.txt)
          SKIPS=$(awk '/Skips reported:/ { sum += $3 } END { print sum + 0 }' bsdtar_test_output.txt)
          PASSED=$((TOTAL - FAILED))

          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests passed | **${PASSED}** / ${TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests failed | ${FAILED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests skipped | ${SKIPS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests excluded (crash) | 4 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Assertions failed | ${ASSERT_FAIL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$FAILING" ]; then
            echo "<details><summary>Failing tests (${FAILED})</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILING" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on abnormal pnatar test termination
        if: always() && steps.bsdtar_test.outcome != 'skipped'
        run: |
          if [ ! -f bsdtar_test_output.txt ]; then
            echo "bsdtar_test output was not generated" >&2
            exit 1
          fi

          COMPLETED_BLOCKS=$(grep -c 'Tests run:' bsdtar_test_output.txt || true)
          if [ "${COMPLETED_BLOCKS}" -lt 4 ]; then
            echo "bsdtar_test only completed ${COMPLETED_BLOCKS} / 4 ranges" >&2
            exit 1
          fi
