name: Build Webassembly
permissions:
  contents: read # checkout
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/webassembly.yml"
  push:
    paths:
      - "lib/**"
      - "pna/**"
      - "cli/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "resources/test/**"
      - ".cargo/config.toml"
      - "rust-toolchain.toml"
      - ".github/workflows/webassembly.yml"

jobs:
  test:
    name: Test WebAssembly
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable
          - beta
          - nightly
        target:
          - wasm32-unknown-emscripten
          - wasm32-unknown-unknown
          - wasm32-wasip1
          - wasm32-wasip2
        include:
          - target: wasm32-unknown-emscripten
            container: emscripten/emsdk:6.0.2@sha256:644883f58ca15c38c8be59b3a727ba0eff347729bc31d50a3348a6c9ed92bc07
            runner: ubuntu-latest
          - target: wasm32-unknown-unknown
            runner: ubuntu-24.04-arm
          - target: wasm32-wasip1
            container: ghcr.io/portable-network-archive/wasi-sdk-gh-actions:wasi-sdk-27@sha256:c683f8ea612f05ca7e5113696f0bb20b6ad28188074532dfdc3c64977ed5fbaf
            runner: ubuntu-24.04-arm
          - target: wasm32-wasip2
            container: ghcr.io/portable-network-archive/wasi-sdk-gh-actions:wasi-sdk-27@sha256:c683f8ea612f05ca7e5113696f0bb20b6ad28188074532dfdc3c64977ed5fbaf
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: true
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          target: ${{ matrix.target }}
          toolchain: ${{ matrix.rust }}
          rustflags: ''
          cache-key: ${{ matrix.target }}
          cache-save-if: ${{ github.ref_name == github.event.repository.default_branch }}
      - if: ${{ startsWith(matrix.target, 'wasm32-wasi') }}
        name: Setup wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
        with:
          github_token: ${{ github.token }}
      - if: ${{ startsWith(matrix.target, 'wasm32-wasi') }}
        name: Run test
        run: |
          cargo test -p libpna --locked --target "$TARGET" -- --nocapture
        env:
          TARGET: ${{ matrix.target }}
      - if: ${{ startsWith(matrix.target, 'wasm32-wasip1') && startsWith(matrix.rust, 'nightly')}}
        name: Run test
        run: |
          cargo test --locked --target "$TARGET" -- --nocapture
        env:
          TARGET: ${{ matrix.target }}
      - if: ${{ startsWith(matrix.target, 'wasm32-unknown-emscripten') && !startsWith(matrix.rust, 'nightly') }}
        name: Run test
        run: |
          cargo test -p libpna --locked --target "$TARGET" -- --skip test_readme_deps --skip test_html_root_url
        env:
          TARGET: ${{ matrix.target }}
          RUSTFLAGS: "-C link-arg=-sINITIAL_MEMORY=512MB -C link-arg=-sTOTAL_STACK=16MB"
          RUSTDOCFLAGS: "-C link-arg=-sINITIAL_MEMORY=512MB -C link-arg=-sTOTAL_STACK=16MB"
      - name: Run on Node.js
        if: ${{ startsWith(matrix.target, 'wasm32-unknown-emscripten') && startsWith(matrix.rust, 'nightly') }}
        run: |
          cargo run -p portable-network-archive --locked --target "$TARGET" --release -- --help
        env:
          TARGET: ${{ matrix.target }}
          RUSTFLAGS: "-C link-arg=-sINITIAL_MEMORY=512MB -C link-arg=-sTOTAL_STACK=16MB"
      - if: ${{ endsWith(matrix.target, 'unknown') }}
        name: get wasm-bindgen version
        id: get_version
        run: |
          VERSION=$(cargo metadata --locked --format-version 1 | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - if: ${{ endsWith(matrix.target, 'unknown') }}
        name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # v1.21.0
      - if: ${{ endsWith(matrix.target, 'unknown') }}
        name: Install wasm-bindgen-cli from crates.io
        run: |
          cargo binstall --no-confirm --force wasm-bindgen-cli --version "$WASM_BINDGEN_VERSION"
        env:
          WASM_BINDGEN_VERSION: ${{ steps.get_version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For ease GitHub API rate limits
      - if: ${{ endsWith(matrix.target, 'unknown') }}
        name: Run test
        run: |
          cargo test -p libpna --locked --target "$TARGET" --release
        env:
          TARGET: ${{ matrix.target }}
