name: actions-lint
on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actionlint.yaml"
      - ".github/zizmor.yml"
  push:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - ".github/actionlint.yaml"
      - ".github/zizmor.yml"
  schedule:
    - cron: '15 13 * * 0'
jobs:
  actionlint:
    name: Run actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read # checkout
      checks: write # reviewdog annotations
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Collect workflow files (excluding auto-generated release.yml)
        id: files
        run: |
          # release.yml is auto-generated by cargo-dist; modifications are overwritten on update
          files=$(find .github/workflows -maxdepth 1 -name '*.yml' ! -name 'release.yml' | sort | tr '\n' ' ')
          if [ -z "$files" ]; then
            echo "::error::No workflow files found to lint"
            exit 1
          fi
          echo "targets=$files" >> "$GITHUB_OUTPUT"
      - name: Run actionlint
        uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          fail_level: error
          filter_mode: nofilter
          reporter: github-check
          actionlint_flags: ${{ steps.files.outputs.targets }}
  zizmor:
    name: Run zizmor
    # Scans all workflows including auto-generated release.yml;
    # suppress false positives via zizmor.yml config if needed
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read # checkout
      security-events: write # SARIF upload
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          persona: pedantic
